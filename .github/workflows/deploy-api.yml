name: Deploy API

on:
    push:
        branches: [main]
        paths:
            - 'api/**'
    workflow_dispatch:

jobs:
    deploy:
        name: Deploy to Render
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: JorgeLNJunior/render-deploy@v1.5.0
              with:
                service_id: ${{ secrets.RENDER_SERVICE_ID }}
                api_key: ${{ secrets.RENDER_API_KEY }}
                wait_deploy: true