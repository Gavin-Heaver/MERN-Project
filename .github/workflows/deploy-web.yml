name: Deploy Web

on:
    push:
        branches: [main]
        paths:
            - 'web/**'
    workflow_dispatch:
    
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: Install Vercel CLI
              run: npm install -g vercel

            - name: Deploy to Vercel
              run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --cwd web
              env:
                VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                VERCEL_GIT_COMMIT_AUTHOR_NAME: ${{ secrets.VERCEL_GIT_COMMIT_AUTHOR_NAME }}
                VERCEL_GIT_COMMIT_AUTHOR_LOGIN: ${{ secrets.VERCEL_GIT_COMMIT_AUTHOR_LOGIN }}